<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI To-Do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>AI To-Do App</h1>
    <p class="subtitle">Add a task. AI will prioritize it.</p>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="e.g. Study DBMS for exam" onkeydown="handleKey(event)">
      <button onclick="addTask()">Add Task</button>
    </div>

    <div id="status" class="status"></div>
    <div id="todoList"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
